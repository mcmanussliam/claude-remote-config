name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Bump version
        run: node scripts/version-bump.mjs ${{ github.event.inputs.bump }}

      - name: Generate changelog
        run: node scripts/changelog.mjs > .release-notes.md

      - name: Build
        run: pnpm build

      - name: Commit, tag, and push
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json .claude-plugin/plugin.json .claude-plugin/marketplace.json CHANGELOG.md
          git add --force dist/
          git commit -m "chore(release): v${VERSION}"
          git tag -a "remote-config--v${VERSION}" -m "v${VERSION}"
          git push origin main
          git push origin "remote-config--v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "remote-config--v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file .release-notes.md
